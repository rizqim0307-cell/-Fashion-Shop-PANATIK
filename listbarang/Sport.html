<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Gabungan</title>
    
    <style>
        /* --- CSS INTERNAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1c1e21;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container Utama */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Kartu Produk */
        .card {
            background: #ffffff;
            border-radius: 12px;
            width: 230px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Gambar Produk */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }

        /* Detail Produk */
        .card h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            height: 40px; /* Menjaga teks tetap sejajar */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card .price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Tombol Aksi */
        .btn-buy {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background-color: #34495e;
        }

        /* Badge Tambahan */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1c40f;
            color: #000;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Daftar Produk</h1>
    </header>

    <main class="container">
        <div class="card">
            <span class="badge">Hot</span>
            <img src="https://https://gmsport.id/wp-content/uploads/2022/12/troya-DSC_1010-wite-fg-scaled-e1671975692644.webp" alt="Barang 1">
            <h3>Sepatu Troya FG</h3>
            <span class="price">Rp 3.500.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://contents.mediadecathlon.com/p2571104/k$0dd4af777610572590b25a42816f4d7a/bola-sepak-club-hybrid-ringan-ukuran-5-putih-kipsta-8790037.jpg" alt="Barang 2">
            <h3>Bola sepak Club Hybird</h3>
            <span class="price">Rp 200.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://contents.mediadecathlon.com/p2501144/k$5ba042970da655fbf23ac796d1987867/sarung-tangan-kiper-anak-f500-viralto-jingga-biru-kipsta-8755953.jpg?f=1920x0&format=auto" alt="Barang 3">
            <h3>Sarung Tangan Kiper</h3>
            <span class="price">Rp 500.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://www.static-src.com/wcsstore/Indraprastha/images/catalog/full/catalog-image/110/MTA-179583158/prodigo_footwear_prodigo_-_kaos_kaki_sepak_bola_gatra_i_kaos_kaki_futsal_panjang_i_kaos_kaki_olahraga_motif_prodigo_panjang_-_katun_full01_po0i68dm.jpg" alt="Barang 4">
            <h3>Prodigo Kaos Kaki Sepak Bola</h3>
            <span class="price">Rp 50.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn3.gstatic.com/shopping?q=tbn:ANd9GcSmg5S4CWs3Ki04L_pfLvEumh47ZieB7frwn2g4NYMknnxweDIosb52c0_YccH2SP5QD_RGXkEuRVeKD-AqUen4UmvHEr--md9vSk8hk0PlVDos3OnUfZ3907tqJ9dd0VG9BURQCvA&usqp=CAc" alt="Barang 5">
            <h3>Jaring Gawang Sepak Bola</h3>
            <span class="price">Rp 400.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </main>

</body>
</html>

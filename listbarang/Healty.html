<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Gabungan</title>
    
    <style>
        /* --- CSS INTERNAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1c1e21;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container Utama */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Kartu Produk */
        .card {
            background: #ffffff;
            border-radius: 12px;
            width: 230px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Gambar Produk */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }

        /* Detail Produk */
        .card h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            height: 40px; /* Menjaga teks tetap sejajar */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card .price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Tombol Aksi */
        .btn-buy {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background-color: #34495e;
        }

        /* Badge Tambahan */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1c40f;
            color: #000;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Daftar Produk</h1>
    </header>

    <main class="container">
        <div class="card">
            <span class="badge">Hot</span>
            <img src="https://res-2.cloudinary.com/dk0z4ums3/image/upload/c_scale,h_500,w_500/v1/production/pharmacy/products/1723113489_hansaplast_kain_elastis_standard_100_lembar" alt="Barang 1">
            <h3>Hansaplast Kain Elastis Standard 100 Lembar</h3>
            <span class="price">Rp 50.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://down-id.img.susercontent.com/file/id-11134207-7rasd-m1wpkvozvvbw91" alt="Barang 2">
            <h3>Perban Gulung Elastis Medis Pembalut Luka Elastic</h3>
            <span class="price">Rp 20.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://assets.babyzania.com/image/cache/catalog/1/Betadine-Antiseptic-Solution-Obat-Luka---15ml-800x800.jpg" alt="Barang 3">
            <h3>Betadine Antiseptic Solution Obat Luka - 15ml</h3>
            <span class="price">Rp 20.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://onemedstore.id/wp-content/uploads/2024/02/Kotak-P3K-AA-v2-@-ONEMED.jpg" alt="Barang 4">
            <h3>Kotak P3K AA OneMed</h3>
            <span class="price">Rp 70.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ91P7a751-gdi7SHJM5v46WBeLwL_HKMu5dA&s" alt="Barang 5">
            <h3>ALKOHOL 70 100 ML</h3>
            <span class="price">Rp 40.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </main>

</body>
</html>

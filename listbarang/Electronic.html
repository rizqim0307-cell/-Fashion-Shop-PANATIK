<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Gabungan</title>
    
    <style>
        /* --- CSS INTERNAL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #1c1e21;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Container Utama */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Kartu Produk */
        .card {
            background: #ffffff;
            border-radius: 12px;
            width: 230px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #eee;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        /* Gambar Produk */
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }

        /* Detail Produk */
        .card h3 {
            font-size: 1rem;
            margin-bottom: 8px;
            height: 40px; /* Menjaga teks tetap sejajar */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card .price {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: block;
        }

        /* Tombol Aksi */
        .btn-buy {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-buy:hover {
            background-color: #34495e;
        }

        /* Badge Tambahan */
        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #f1c40f;
            color: #000;
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: bold;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Daftar Produk</h1>
    </header>

    <main class="container">
        <div class="card">
            <span class="badge">Hot</span>
            <img src="https://static.retailworldvn.com/Products/Images/12158/314136/led-tv-samsung-full-hd-43-inch-ua43t5001a-1.jpg" alt="Barang 1">
            <h3>TV Led Samsung 43 inch</h3>
            <span class="price">Rp 4.500.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://ae01.alicdn.com/kf/S8cde0d817b4e49fead4ba848eaa2e362z.jpg" alt="Barang 2">
            <h3>PRUNUS J120 Radio</h3>
            <span class="price">Rp 1.000.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn1.gstatic.com/shopping?q=tbn:ANd9GcSfUwfJS5YLatdXjQpP5mGTCpGBmPjJ81CVsKFgISQZGMzqNzHY10m2E9HMUiyRRVP7gDMKQAVQaavX8ZSz7Hphf68zX75lpoxBX4dvHR6sDrX-m9IVvrwrOoRkwmhKKe7sKPb56wusqp=CAc" alt="Barang 3">
            <h3>Kulkas 4 Pintu</h3>
            <span class="price">Rp 15.500.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://energybali.co.id/wp-content/uploads/2025/05/1-06-05-2025.jpg" alt="Barang 4">
            <h3>MIYAKO MAGIC COM 6 LITER</h3>
            <span class="price">Rp 750.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>

        <div class="card">
            <img src="https://kjperabot.co.id/media/catalog/product/cache/ab681b22975df61d6e20d5279c5681b7/2/7/279b28599d8172224aafd83995d5ea2c.jpeg" alt="Barang 5">
            <h3>PHILIPS SETRIKA HD1172</h3>
            <span class="price">Rp 400.000</span>
            <button class="btn-buy">Tambah ke Keranjang</button>
        </div>
    </main>

</body>
</html>
